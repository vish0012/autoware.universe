autoware_system_design_format: 0.3.0

# cspell: ignore semseg

# node information
name: TensorrtYolox.node

package:
  name: autoware_tensorrt_yolox
  provider: autoware

launch:
  plugin: autoware::tensorrt_yolox::TrtYoloXNode
  executable: autoware_tensorrt_yolox_node_exe
  node_output: screen

# interface
subscribers:
  - name: image
    message_type: sensor_msgs/msg/Image
    remap_target: ~/in/image

publishers:
  - name: objects
    message_type: tier4_perception_msgs/msg/DetectedObjectsWithFeature
    remap_target: ~/out/objects
  - name: mask
    message_type: sensor_msgs/msg/Image
    remap_target: ~/out/mask

# parameters
param_files:
  - name: yolox_param_path
    default: config/yolox_s_plus_opt.param.yaml

param_values:
  - name: model_path
    type: directory
    default: $(var data_path)/tensorrt_yolox/yolox-sPlus-opt-pseudoV2-T4-960x960-T4-seg16cls.onnx
  - name: label_path
    type: directory
    default: $(var data_path)/tensorrt_yolox/label.txt
  - name: color_map_path
    type: directory
    default: $(var data_path)/tensorrt_yolox/semseg_color_map.csv
  - name: build_only
    type: bool
    default: false

# processes
processes:
  - name: run
    trigger_conditions:
      - on_input: image
    outcomes:
      - to_output: objects
      - to_output: mask
