name: clang-tidy-pr-comments-manually

on:
  workflow_dispatch:
    inputs:
      workflow_run_id_or_url:
        description: The target workflow run ID or URL of the build-and-test-differential workflow
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy-pr-comments-manually:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        rosdistro: [humble, jazzy]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract workflow run ID
        id: extract-run-id
        run: |
          echo "workflow-run-id=$(echo "${{ inputs.workflow_run_id_or_url }}" | sed -e "s|.*runs/||" -e "s|/jobs.*||")" >> $GITHUB_OUTPUT

      - name: Download analysis results
        run: |
          gh run download "${{ steps.extract-run-id.outputs.workflow-run-id }}" -D /tmp -p 'clang-tidy-result-${{ matrix.rosdistro }}*' || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find clang-tidy result directory
        id: find-result-dir
        run: |
          result_dir=$(find /tmp -maxdepth 1 -type d -name 'clang-tidy-result-${{ matrix.rosdistro }}*' | head -1)
          echo "result-dir=$result_dir" >> $GITHUB_OUTPUT
        shell: bash

      - name: Check if the fixes.yaml file exists
        id: check-fixes-yaml-existence
        if: ${{ steps.find-result-dir.outputs.result-dir != '' }}
        uses: autowarefoundation/autoware-github-actions/check-file-existence@v1
        with:
          files: ${{ steps.find-result-dir.outputs.result-dir }}/fixes.yaml

      - name: Set variables
        if: ${{ steps.check-fixes-yaml-existence.outputs.exists == 'true' }}
        id: set-variables
        run: |
          result_dir="${{ steps.find-result-dir.outputs.result-dir }}"
          echo "pr-id=$(cat "$result_dir/pr-id.txt")" >> $GITHUB_OUTPUT
          echo "pr-head-repo=$(cat "$result_dir/pr-head-repo.txt")" >> $GITHUB_OUTPUT
          echo "pr-head-ref=$(cat "$result_dir/pr-head-ref.txt")" >> $GITHUB_OUTPUT

      - name: Check out PR head
        if: ${{ steps.check-fixes-yaml-existence.outputs.exists == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.set-variables.outputs.pr-head-repo }}
          ref: ${{ steps.set-variables.outputs.pr-head-ref }}
          persist-credentials: false

      - name: Replace paths in fixes.yaml
        if: ${{ steps.check-fixes-yaml-existence.outputs.exists == 'true' }}
        run: |
          result_dir="${{ steps.find-result-dir.outputs.result-dir }}"
          sed -i -e "s|/__w/|/home/runner/work/|g" "$result_dir/fixes.yaml"
          cat "$result_dir/fixes.yaml"

      - name: Copy fixes.yaml to access from Docker Container Action
        if: ${{ steps.check-fixes-yaml-existence.outputs.exists == 'true' }}
        run: |
          cp "${{ steps.find-result-dir.outputs.result-dir }}/fixes.yaml" fixes.yaml

      - name: Run clang-tidy-pr-comments action
        if: ${{ steps.check-fixes-yaml-existence.outputs.exists == 'true' }}
        uses: platisd/clang-tidy-pr-comments@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          clang_tidy_fixes: fixes.yaml
          pull_request_id: ${{ steps.set-variables.outputs.pr-id }}
