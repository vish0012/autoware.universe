autoware_system_design_format: 0.3.0

# node information
name: DistortionCorrector.node

package:
  name: autoware_pointcloud_preprocessor
  provider: autoware

launch:
  plugin: autoware::pointcloud_preprocessor::DistortionCorrectorComponent
  executable: distortion_corrector_node
  node_output: screen

# interfaces
subscribers:
  - name: pointcloud
    message_type: sensor_msgs/msg/PointCloud2
  - name: twist
    message_type: geometry_msgs/msg/TwistWithCovarianceStamped
  - name: imu
    message_type: sensor_msgs/msg/Imu

publishers:
  - name: pointcloud
    message_type: sensor_msgs/msg/PointCloud2

# parameters
param_files:
  - name: param_file
    default: config/distortion_corrector_node.param.yaml

param_values:
  - name: input_frame
    type: string
    default: base_link
  - name: output_frame
    type: string
    default: base_link

# processes
processes:
  - name: undistort
    trigger_conditions:
      - and:
          - on_input: pointcloud
          - or:
              - on_input: twist
              - on_input: imu
    outcomes:
      - to_output: pointcloud
