autoware_system_design_format: 0.3.0

# node information
name: ShapeEstimation.node

package:
  name: autoware_shape_estimation
  provider: autoware

launch:
  plugin: autoware::shape_estimation::ShapeEstimationNode
  executable: shape_estimation_node
  node_output: screen

# interfaces
subscribers:
  - name: ros_transform
    message_type: tf2_msgs/msg/TFMessage
    global: /tf
  - name: objects
    message_type: tier4_perception_msgs/msg/DetectedObjectsWithFeature
    remap_target: input

publishers:
  - name: objects
    message_type: tier4_perception_msgs/msg/DetectedObjectsWithFeature
    remap_target: objects
    qos:
      reliability: reliable
      durability: transient_local

# parameters
param_files:
  - name: config_file
    default: config/shape_estimation.param.yaml

param_values:
  - name: model_path
    type: directory
    default: $(var data_path)/shape_estimation/pointnet.onnx

# processes
processes:
  - name: estimate
    trigger_conditions:
      - on_input: objects
    outcomes:
      - to_output: objects
